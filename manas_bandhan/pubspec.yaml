name: manas_bandhan
description: Manas Bandhan - A matrimonial app for widows and divorcees by MANAS Foundation

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Networking
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1

  # Image Handling
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  flutter_image_compress: ^2.0.4

  # UI Components
  flutter_svg: ^2.0.7
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.0.0

  # Localization
  intl: 0.20.2

  # Maps & URLs
  url_launcher: ^6.1.14

  # Utilities
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.1
  path_provider: ^2.1.1
  path: ^1.8.3

  # Icons
  cupertino_icons: ^1.0.6

  # Firebase (for real-time chat)
  firebase_core: ^3.12.1
  firebase_database: ^11.3.5

  flutter_animate: ^4.5.2
  skeletonizer: ^2.1.2
  google_fonts: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.6
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/


